<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sol Finn Mission Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☀️</text></svg>">
</head>
<body>
    <!-- Fixed Sidebar -->
    <nav id="sidebar" class="sidebar">
        <!-- Brand -->
        <div class="brand">
            <div class="brand-icon">☀️</div>
            <div class="brand-text">
                <div class="brand-title">Sol Finn</div>
                <div class="brand-subtitle">Mission Control</div>
            </div>
        </div>

        <!-- Status Indicator -->
        <div class="status-indicator">
            <div class="status-dot"></div>
            <span class="status-text">ONLINE</span>
        </div>

        <!-- Navigation -->
        <div class="nav-section">
            <div class="nav-group">
                <div class="nav-group-label">Operations</div>
                <a href="#/dashboard" class="nav-item" data-route="dashboard">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-label">Dashboard</span>
                </a>
                <a href="#/office" class="nav-item" data-route="office">
                    <span class="nav-icon">🏢</span>
                    <span class="nav-label">Office</span>
                </a>
                <a href="#/tasks" class="nav-item" data-route="tasks">
                    <span class="nav-icon">📋</span>
                    <span class="nav-label">Tasks</span>
                </a>
            </div>

            <div class="nav-group">
                <div class="nav-group-label">Business</div>
                <a href="#/projects" class="nav-item" data-route="projects">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">Projects</span>
                </a>
                <a href="#/finances" class="nav-item" data-route="finances">
                    <span class="nav-icon">💰</span>
                    <span class="nav-label">Finances</span>
                </a>
                <a href="#/trading" class="nav-item" data-route="trading">
                    <span class="nav-icon">📈</span>
                    <span class="nav-label">Trading</span>
                </a>
            </div>

            <div class="nav-group">
                <div class="nav-group-label">Growth</div>
                <a href="#/content" class="nav-item" data-route="content">
                    <span class="nav-icon">✍️</span>
                    <span class="nav-label">Content</span>
                </a>
                <a href="#/comms" class="nav-item" data-route="comms">
                    <span class="nav-icon">📧</span>
                    <span class="nav-label">Comms</span>
                </a>
            </div>

            <div class="nav-group">
                <div class="nav-group-label">Knowledge</div>
                <a href="#/memory" class="nav-item" data-route="memory">
                    <span class="nav-icon">🧠</span>
                    <span class="nav-label">Memory</span>
                </a>
                <a href="#/docs" class="nav-item" data-route="docs">
                    <span class="nav-icon">📁</span>
                    <span class="nav-label">Docs</span>
                </a>
                <a href="#/calendar" class="nav-item" data-route="calendar">
                    <span class="nav-icon">📅</span>
                    <span class="nav-label">Calendar</span>
                </a>
            </div>

            <div class="nav-group">
                <div class="nav-group-label">System</div>
                <a href="#/team" class="nav-item" data-route="team">
                    <span class="nav-icon">👥</span>
                    <span class="nav-label">Team</span>
                </a>
                <a href="#/activity-log" class="nav-item" data-route="activity-log">
                    <span class="nav-icon">📋</span>
                    <span class="nav-label">Activity Log</span>
                </a>
                <a href="#/toolbox" class="nav-item" data-route="toolbox">
                    <span class="nav-icon">🧰</span>
                    <span class="nav-label">Toolbox</span>
                </a>
                <a href="#/settings" class="nav-item" data-route="settings">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-label">Settings</span>
                </a>
            </div>
        </div>

        <!-- Bottom Clock -->
        <div class="sidebar-footer">
            <div id="current-time" class="current-time"></div>
            <div id="day-counter" class="day-counter">Day 1</div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="main-content" class="main-content">
        <!-- Header -->
        <header class="content-header">
            <h1 id="page-title">Dashboard</h1>
            <div class="header-actions">
                <button id="refresh-btn" class="btn btn-secondary">
                    <span class="btn-icon">🔄</span>
                    Refresh
                </button>
                <div id="last-updated" class="last-updated"></div>
            </div>
        </header>

        <!-- Content Container -->
        <div id="content-area" class="content-area">
            <!-- Page content will be loaded here -->
        </div>
    </main>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/pages/dashboard.js"></script>
    <script src="/js/pages/office.js"></script>
    <script src="/js/pages/tasks.js"></script>
    <script src="/js/pages/projects.js"></script>
    <script src="/js/pages/finances.js"></script>
    <script src="/js/pages/trading.js"></script>
    <script src="/js/pages/content.js"></script>
    <script src="/js/pages/comms.js"></script>
    <script src="/js/pages/memory.js"></script>
    <script src="/js/pages/docs.js"></script>
    <script src="/js/pages/calendar.js"></script>
    <script src="/js/pages/team.js"></script>
    <script src="/js/pages/activity-log.js"></script>
    <script src="/js/pages/toolbox.js"></script>
    <script src="/js/pages/settings.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
